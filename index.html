
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Convertor de medidas(liquido)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Conversor de medidas(temperatura)</h1>

    <p>Converter °C(celsius) para °F(fahrenheit) e K(kelvin)</p>

        <label for="Valor a converter">Valor a converter:</label>
        <input type="number" id="num" placeholder="Converter qual valor?">
        <br><br>

        <button onclick="converter('c-f')">°C-°F</button>
        <button onclick="converter('c-k')">°C-K</button>
        <button onclick="converter('c-f-k')">°C-°F-K</button>
        <button onclick="converter('f-c')">°F-°C</button>
        <button onclick="converter('f-k')">°F-K</button>
        <button onclick="converter('f-c-k')">°F-°C-K</button>
        <button onclick="converter('k-c')">K-°C</button>
        <button onclick="converter('k-f')">K-°F</button>
        <button onclick="converter('k-c-f')">K-°C-°F</button>
        <button onclick="limpar()">Limpar</button>

    <h2 id="resultado"></h2>
   
    <script src="script.js"></script>
</body>
</html>
